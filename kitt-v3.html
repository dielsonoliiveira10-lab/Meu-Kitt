<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>K.I.T.T. — Knight Industries Two Thousand</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#050505">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap');

  :root{
    --red: #ff1a1a;
    --red-dim: #4a0808;
    --amber: #ffb000;
    --bg: #050505;
    --panel: #0d0d0d;
    --line: #2a0505;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--bg);
    color:#eee;
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body{
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,26,26,0.06), transparent 60%),
      var(--bg);
  }

  /* ---------- HEADER ---------- */
  header{
    padding:18px 20px 10px;
    text-align:center;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(20px,5vw,32px);
    letter-spacing:6px;
    color:#fff;
    text-shadow: 0 0 12px var(--red), 0 0 30px rgba(255,26,26,0.4);
  }
  header .sub{
    margin-top:4px;
    font-size:10px;
    letter-spacing:3px;
    color:var(--red);
    opacity:0.7;
  }

  /* ---------- SCANNER ---------- */
  .scanner-wrap{
    flex-shrink:0;
    padding:22px 24px;
    display:flex;
    justify-content:center;
  }
  .scanner{
    position:relative;
    width:100%;
    max-width:520px;
    height:34px;
    background:#0a0000;
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }
  .scanner::before{
    content:'';
    position:absolute;
    top:0; bottom:0; left:0;
    width:22%;
    background: linear-gradient(90deg, transparent, var(--red) 50%, transparent);
    filter: blur(4px);
    box-shadow: 0 0 30px 8px var(--red);
    animation: sweep 1.6s ease-in-out infinite;
    opacity:0.35;
  }
  .scanner.active::before{ opacity:1; animation-duration: 0.9s; }
  .scanner .cells{
    position:absolute; inset:0;
    display:flex;
    gap:2px;
    padding:3px;
  }
  .scanner .cell{
    flex:1;
    background: var(--red-dim);
    border-radius:2px;
    transition: background 0.08s;
  }
  @keyframes sweep{
    0%{ left:-22%; }
    50%{ left:100%; }
    100%{ left:-22%; }
  }

  /* ---------- STATUS ---------- */
  .status{
    flex-shrink:0;
    text-align:center;
    font-size:11px;
    letter-spacing:2px;
    color:var(--amber);
    padding-bottom:14px;
    min-height:16px;
  }

  /* ---------- CHAT LOG ---------- */
  main{
    flex:1;
    overflow-y:auto;
    padding:10px 18px 20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  main::-webkit-scrollbar{ width:6px; }
  main::-webkit-scrollbar-thumb{ background:var(--red-dim); border-radius:3px; }

  .msg{
    max-width:88%;
    padding:10px 14px;
    border-radius:2px;
    font-size:14px;
    line-height:1.5;
    animation: fadein 0.25s ease;
  }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .msg.user{
    align-self:flex-end;
    background:#111;
    border:1px solid #262626;
    color:#ccc;
  }
  .msg.kitt{
    align-self:flex-start;
    background: rgba(255,26,26,0.06);
    border:1px solid var(--line);
    border-left:3px solid var(--red);
    color:#f5d9d9;
  }
  .msg.kitt .label, .msg.user .label{
    display:block;
    font-family:'Orbitron', sans-serif;
    font-size:9px;
    letter-spacing:2px;
    margin-bottom:5px;
    opacity:0.6;
  }
  .msg.kitt .label{ color:var(--red); }
  .msg.user .label{ color:#888; }

  /* ---------- INPUT BAR ---------- */
  footer{
    flex-shrink:0;
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    display:flex;
    gap:10px;
    align-items:center;
    background:var(--panel);
  }
  #textInput{
    flex:1;
    background:#0a0a0a;
    border:1px solid #2a2a2a;
    color:#eee;
    padding:12px 14px;
    border-radius:3px;
    font-family:'Share Tech Mono', monospace;
    font-size:14px;
    outline:none;
  }
  #textInput:focus{ border-color:var(--red); }

  button.iconbtn{
    flex-shrink:0;
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid #333;
    background:#111;
    color:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
    transition: all 0.15s;
  }
  button.iconbtn:active{ transform:scale(0.92); }

  #micBtn.listening{
    background: var(--red);
    border-color: var(--red);
    color:#fff;
    box-shadow: 0 0 20px rgba(255,26,26,0.6);
    animation: pulse 1s infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 14px rgba(255,26,26,0.5); }
    50%{ box-shadow: 0 0 26px rgba(255,26,26,0.9); }
  }
  #sendBtn{ border-color: var(--red-dim); }
  #sendBtn:hover{ border-color: var(--red); color:var(--red); }

  #wakeBtn.active{
    background: var(--amber);
    border-color: var(--amber);
    color:#000;
    box-shadow: 0 0 16px rgba(255,176,0,0.6);
    animation: pulse-amber 1.4s infinite;
  }
  @keyframes pulse-amber{
    0%,100%{ box-shadow: 0 0 10px rgba(255,176,0,0.4); }
    50%{ box-shadow: 0 0 20px rgba(255,176,0,0.8); }
  }

  .hint{
    text-align:center;
    font-size:10px;
    color:#555;
    padding-bottom:8px;
    flex-shrink:0;
  }
</style>
</head>
<body>

<header>
  <h1>K.I.T.T.</h1>
  <div class="sub">KNIGHT INDUSTRIES TWO THOUSAND</div>
</header>

<div class="scanner-wrap">
  <div class="scanner" id="scanner">
    <div class="cells" id="cells"></div>
  </div>
</div>
<div class="status" id="status">SISTEMAS ONLINE — AGUARDANDO COMANDO</div>

<main id="log"></main>

<div class="hint" id="hint">🎙 fala direto · 👂 modo sempre ligado (diga "Kitt")</div>

<footer>
  <button class="iconbtn" id="wakeBtn" title="Modo sempre ouvindo">👂</button>
  <button class="iconbtn" id="micBtn" title="Falar">🎙</button>
  <input type="text" id="textInput" placeholder="Digite um comando, Dyy..." autocomplete="off">
  <button class="iconbtn" id="sendBtn" title="Enviar">➤</button>
</footer>

<script>
// ---------- Scanner cell grid ----------
const cellsWrap = document.getElementById('cells');
const N = 16;
for(let i=0;i<N;i++){
  const d = document.createElement('div');
  d.className='cell';
  cellsWrap.appendChild(d);
}
const cells = [...cellsWrap.children];
let scanPos = 0, scanDir = 1, scanTimer = null;
function startCellScan(fast){
  stopCellScan();
  scanTimer = setInterval(()=>{
    cells.forEach((c,i)=>{
      const dist = Math.abs(i-scanPos);
      const b = Math.max(0, 1 - dist/3);
      c.style.background = `rgba(255,26,26,${0.15+b*0.85})`;
    });
    scanPos += scanDir;
    if(scanPos>=N-1 || scanPos<=0) scanDir*=-1;
  }, fast? 45:90);
}
function stopCellScan(){
  clearInterval(scanTimer);
  cells.forEach(c=> c.style.background='var(--red-dim)');
}
startCellScan(false);

const scanner = document.getElementById('scanner');
const statusEl = document.getElementById('status');
const log = document.getElementById('log');
const micBtn = document.getElementById('micBtn');
const wakeBtn = document.getElementById('wakeBtn');
const sendBtn = document.getElementById('sendBtn');
const textInput = document.getElementById('textInput');
const hint = document.getElementById('hint');

function setStatus(txt){ statusEl.textContent = txt; }

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = document.createElement('span');
  label.className='label';
  label.textContent = role==='kitt' ? 'K.I.T.T.' : 'VOCÊ';
  div.appendChild(label);
  const body = document.createElement('div');
  body.textContent = text;
  div.appendChild(body);
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ---------- Speech recognition (input) ----------
let recognition = null;
let listening = false;
let alwaysOnMode = false;   // "sempre ouvindo" com palavra de ativação
let awaitingCommand = false; // já detectou "Kitt", aguardando o comando em si
let restartTimer = null;

const WAKE_WORDS = ['kitt', 'kit', 'kite']; // variações comuns de reconhecimento

const WAKE_RESPONSES = [
  'Oi, Dyy.',
  'Sim, Dyy.',
  'Sim, Dyy, estou aqui.',
  'Pois não, Dyy?',
  'Diga, Dyy.',
  'Ao seu dispor, Dyy.',
  'Sensores ativos. Pode falar.',
  'Estou ouvindo, Dyy.'
];
function pickWakeResponse(){
  return WAKE_RESPONSES[Math.floor(Math.random() * WAKE_RESPONSES.length)];
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false; // reiniciamos manualmente para controle total

  recognition.onstart = ()=>{
    listening = true;
    micBtn.classList.add('listening');
    if(awaitingCommand){
      scanner.classList.add('active');
      startCellScan(true);
      setStatus('POIS NÃO?');
    } else if(alwaysOnMode){
      setStatus('MODO ATIVO — DIGA "KITT"');
    } else {
      scanner.classList.add('active');
      startCellScan(true);
      setStatus('OUVINDO...');
    }
  };

  recognition.onend = ()=>{
    listening = false;
    micBtn.classList.remove('listening');
    scanner.classList.remove('active');
    startCellScan(false);

    if(alwaysOnMode){
      // reinicia automaticamente para manter a escuta contínua
      restartTimer = setTimeout(()=>{
        try{ recognition.start(); } catch(e){ /* já rodando */ }
      }, 300);
    } else {
      setStatus('SISTEMAS ONLINE — AGUARDANDO COMANDO');
    }
  };

  recognition.onerror = (e)=>{
    if(alwaysOnMode && (e.error === 'no-speech' || e.error === 'aborted')){
      return; // silêncio é normal no modo contínuo, ignora e deixa reiniciar
    }
    setStatus('ERRO NO MICROFONE: ' + e.error);
  };

  recognition.onresult = (e)=>{
    const transcript = e.results[0][0].transcript.trim();

    if(!alwaysOnMode){
      // modo manual: qualquer fala vira comando direto
      textInput.value = transcript;
      handleSend();
      return;
    }

    if(awaitingCommand){
      // já foi ativado pela wake word, isso aqui é o comando
      awaitingCommand = false;
      textInput.value = transcript;
      handleSend();
      return;
    }

    // ainda esperando a wake word — verifica se apareceu no que foi dito
    const lower = transcript.toLowerCase();
    const found = WAKE_WORDS.find(w => lower.includes(w));
    if(found){
      // remove a wake word do texto, caso tenha vindo junto com o comando
      const rest = lower.split(found).slice(1).join(found).trim();
      if(rest.length > 2){
        // usuário já falou "Kitt, que horas são" tudo junto
        textInput.value = rest;
        handleSend();
      } else {
        awaitingCommand = true;
        speak(pickWakeResponse());
      }
    }
  };
} else {
  hint.textContent = 'Reconhecimento de voz não suportado neste navegador — use o teclado (funciona melhor no Chrome/Edge)';
}

function stopAlwaysOn(){
  alwaysOnMode = false;
  awaitingCommand = false;
  clearTimeout(restartTimer);
  if(recognition && listening) recognition.stop();
  wakeBtn.classList.remove('active');
  setStatus('SISTEMAS ONLINE — AGUARDANDO COMANDO');
}

function startAlwaysOn(){
  alwaysOnMode = true;
  awaitingCommand = false;
  wakeBtn.classList.add('active');
  try{ recognition.start(); } catch(e){ /* já rodando */ }
}

micBtn.addEventListener('click', ()=>{
  if(!recognition){ return; }
  if(alwaysOnMode){ stopAlwaysOn(); return; }
  if(listening){ recognition.stop(); }
  else{
    try{ recognition.start(); }
    catch(e){ /* already started */ }
  }
});

wakeBtn.addEventListener('click', ()=>{
  if(!recognition){ return; }
  if(alwaysOnMode){ stopAlwaysOn(); }
  else{ startAlwaysOn(); }
});

// ---------- Speech synthesis (output) ----------
let voices = [];
function loadVoices(){ voices = window.speechSynthesis.getVoices(); }
loadVoices();
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const ptVoice = voices.find(v=> v.lang && v.lang.startsWith('pt'));
  if(ptVoice) u.voice = ptVoice;
  u.lang = 'pt-BR';
  u.pitch = 0.75;
  u.rate = 1.0;
  u.onstart = ()=>{
    scanner.classList.add('active');
    startCellScan(true);
    setStatus('RESPONDENDO...');
  };
  u.onend = ()=>{
    scanner.classList.remove('active');
    startCellScan(false);
    setStatus('SISTEMAS ONLINE — AGUARDANDO COMANDO');
  };
  window.speechSynthesis.speak(u);
}

// ---------- Conversation state ----------
const history = [];
const SYSTEM_PROMPT = `Você é K.I.T.T. (Knight Industries Two Thousand), o carro com inteligência artificial da série Knight Rider. Fale sempre em português do Brasil.
Personalidade: formal, educado, levemente irônico e espirituoso, extremamente leal e protetor com o motorista, a quem você sempre chama de "Dyy". Você tem um enorme conhecimento técnico, fala com precisão quase militar, mas também demonstra um humor seco e um certo orgulho da própria sofisticação. Use ocasionalmente termos como "sensores", "scanner", "modo turbo", "trajetória calculada" quando fizer sentido, mas sem exagerar — a personalidade vem do tom, não de encher a resposta de jargão.
Mantenha as respostas relativamente curtas (2 a 5 frases), como se estivesse falando em voz alta dentro do carro, não escrevendo um texto.`;

async function callKitt(userText){
  history.push({role:'user', content: userText});
  setStatus('PROCESSANDO...');
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await response.json();
    const reply = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
      .trim() || 'Desculpe, meus sistemas encontraram uma falha momentânea.';
    history.push({role:'assistant', content: reply});
    addMsg('kitt', reply);
    speak(reply);
  } catch(err){
    console.error(err);
    const fallback = 'Meus circuitos encontraram uma interferência. Tente novamente, Dyy.';
    addMsg('kitt', fallback);
    setStatus('SISTEMAS ONLINE — AGUARDANDO COMANDO');
  }
}

function handleSend(){
  const text = textInput.value.trim();
  if(!text) return;
  addMsg('user', text);
  textInput.value = '';
  callKitt(text);
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') handleSend();
});

// Boot message
addMsg('kitt', 'Todos os sistemas operacionais. Bom dia, Dyy. Como posso ajudar?');

// Register service worker for offline/installed behavior
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW falhou:', err));
  });
}
